name: auto-post

# 자주 깨어나 게이트(publish.js)가 28·29·30·31분 간격을 거른다.
# GitHub Actions 스케줄은 분 단위지만 정시 보장은 안 됨(혼잡 시 지연) — 게이트 방식이라 무방.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}        # 수동 실행 버튼

permissions:
  contents: write              # 봇이 커밋/푸시할 수 있도록

concurrency:
  group: auto-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 발행 게이트 + 큐 자동 보충 (한 번에)
        run: node publish.js
        env:
          QUEUE_MIN: '4'
          HOTELS: '7'

      - name: 변경 있으면 커밋·푸시
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "howcartful-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(auto): publish queued article"
            git push
            echo "pushed"
          else
            echo "변경 없음 — 아직 발행 시간 아님"
          fi
